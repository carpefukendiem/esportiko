<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <filter id="n">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" result="t" />
    <feColorMatrix type="saturate" values="0" in="t" result="g" />
    <feComponentTransfer in="g" result="c">
      <feFuncA type="linear" slope="0.12" intercept="0" />
    </feComponentTransfer>
  </filter>
  <rect width="100%" height="100%" filter="url(#n)" opacity="0.45" />
</svg>
